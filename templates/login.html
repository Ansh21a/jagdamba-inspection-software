
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Jagdamba Inspection</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    /* Freepik-like card/login look (self-contained) */
    .login-page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#f5f7ff,#eef2ff);
      padding:24px;
    }
    .login-card{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:14px;
      box-shadow:0 10px 30px rgba(24,39,75,.12);
      padding:26px;
      position:relative;
      overflow:hidden;
    }
    .login-card:before{
      content:"";
      position:absolute;
      inset:-80px -120px auto auto;
      width:220px;
      height:220px;
      background:radial-gradient(circle at 30% 30%, rgba(123,104,238,.35), rgba(123,104,238,0));
      transform:rotate(12deg);
      pointer-events:none;
    }
    .login-title{
      font-size:22px;
      font-weight:700;
      margin:0 0 8px;
      color:#111827;
    }
    .login-subtitle{
      margin:0 0 18px;
      color:#6b7280;
      font-size:14px;
    }
    .login-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:10px 0 16px;
      font-size:13px;
    }
    .login-actions label{color:#374151;}
    .login-actions a{color:#4f46e5;text-decoration:none;}
    .field{
      width:100%;
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:12px 12px;
      font-size:14px;
      outline:none;
      background:#fff;
      transition:border-color .15s ease, box-shadow .15s ease;
    }
    .field:focus{
      border-color:#7B68EE;
      box-shadow:0 0 0 4px rgba(123,104,238,.15);
    }
    .field-wrap{margin-bottom:14px;}
    .btn{
      width:100%;
      padding:12px 14px;
      border:none;
      border-radius:10px;
      background:#191970;
      color:#fff;
      font-weight:600;
      cursor:pointer;
      transition:transform .05s ease, filter .15s ease;
    }
    .btn:active{transform:translateY(1px);}
    .error{
      margin:0 0 14px;
      padding:10px 12px;
      border-radius:10px;
      background:#fee2e2;
      color:#991b1b;
      font-size:13px;
    }
    .login-footer{
      margin-top:14px;
      text-align:center;
      color:#6b7280;
      font-size:12px;
    }
    .row{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }
    .jp{
      height:54px;
      width:auto;
      border-radius:12px;
      background:#f3f4ff;
      padding:8px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="row">
        <img class="jp" src="/static/jp_logo.png" alt="Jagdamba" />
      </div>

      <h2 class="login-title">Welcome back</h2>
      <p class="login-subtitle">Sign in to access your inspection dashboard.</p>

      {% if error %}<div class="error">{{ error }}</div>{% endif %}

      <form method="post">
        <div class="field-wrap">
          <input class="field" type="text" name="username" placeholder="Username" required />
        </div>
        <div class="field-wrap">
          <input class="field" type="password" name="password" placeholder="Password" required />
        </div>

        <div class="login-actions">
          <label>
            <input type="checkbox" /> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button class="btn" type="submit">Login</button>
      </form>

      <div class="login-footer">Jagdamba Inspection Software</div>
    </div>
  </div>
</body>
</html>
